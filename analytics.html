{% extends "base.html" %}
{% block title %}Analytics{% endblock %}

{% block extra_css %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">📊 Analytics</div>
  <div style="display:flex;gap:10px;">
    <a href="/dashboard" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
    <a href="/reports" class="btn btn-primary btn-sm"><i class="bi bi-cpu"></i> AI Reports</a>
  </div>
</div>

<div class="row g-4">
  <div class="col-md-8">
    <div class="card">
      <div style="font-size:0.82rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-muted); margin-bottom:18px;">
        <i class="bi bi-bar-chart"></i> Attendance % per Student
      </div>
      <canvas id="attChart" height="120"></canvas>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card">
      <div style="font-size:0.82rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-muted); margin-bottom:18px;">
        <i class="bi bi-pie-chart"></i> Risk Distribution
      </div>
      <canvas id="riskChart"></canvas>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const labels = {{ labels | tojson | safe }};
const data = {{ attendance | tojson | safe }};
const colors = {{ colors | tojson | safe }};

// Bar chart
new Chart(document.getElementById('attChart').getContext('2d'), {
  type: 'bar',
  data: {
    labels,
    datasets: [{
      label: 'Attendance %',
      data,
      backgroundColor: colors,
      borderRadius: 6,
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => `${ctx.raw}%`
        }
      }
    },
    scales: {
      x: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
      y: { beginAtZero: true, max: 100, ticks: { color: '#64748b', callback: v => v+'%' }, grid: { color: 'rgba(255,255,255,0.05)' } }
    }
  }
});

// Pie chart — risk distribution
const safe = data.filter(v => v >= 85).length;
const good = data.filter(v => v >= 75 && v < 85).length;
const warn = data.filter(v => v >= 60 && v < 75).length;
const crit = data.filter(v => v < 60).length;

new Chart(document.getElementById('riskChart').getContext('2d'), {
  type: 'doughnut',
  data: {
    labels: ['Safe (≥85%)', 'Good (75-85%)', 'Warning (60-75%)', 'Critical (<60%)'],
    datasets: [{
      data: [safe, good, warn, crit],
      backgroundColor: ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444'],
      borderWidth: 0,
      hoverOffset: 6
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: {
        position: 'bottom',
        labels: { color: '#94a3b8', font: { size: 11 }, padding: 12 }
      }
    }
  }
});
</script>
{% endblock %}
